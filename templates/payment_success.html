<!DOCTYPE html>
<html>
<head>
    <title>Payment Success</title>
    <style>
        body {
            background-color: #0d1b2a;
            color: white;
            font-family: Arial;
            padding: 40px;
            text-align: center;
        }
        .box {
            background: #1b263b;
            padding: 40px;
            border-radius: 12px;
            max-width: 500px;
            margin: auto;
        }
        .btn {
            display: inline-block;
            background: #0077b6;
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="box">
    <h1>✅ Payment Successful!</h1>
    <p><strong>Order ID:</strong> #{{ order.id }}</p>
    <p><strong>Transaction ID:</strong> {{ transaction_id }}</p>

    <a class="btn" href="{% url 'order_detail' order.id %}">
        📦 Back to Order
    </a>
</div>

</body>
</html>
