<!DOCTYPE html>
<html>
<head>
    <title>Your Cart - QuickBite</title>
    <style>
        body {
            font-family: Arial;
            background: #1a1a2e;
            color: white;
            padding: 30px;
        }
        h1 {
            color: #00b4d8;
        }
        .item {
            background: #16213e;
            padding: 15px;
            margin: 10px 0;
            border-radius: 10px;
        }
        .btn {
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 8px;
            display: inline-block;
            margin-top: 15px;
        }
        .checkout {
            background: #2a9d8f;
        }
        .back {
            background: #0077b6;
        }
    </style>
</head>
<body>

<h1>🛒 Your Cart</h1>

{% if items %}
    {% for entry in items %}
    <div class="item">
        <h3>{{ entry.item.name }}</h3>
        <p>📦 Quantity: {{ entry.quantity }}</p>
        <p>💵 Subtotal: ৳{{ entry.subtotal }}</p>
    </div>
    {% endfor %}

    <h2>Total: ৳{{ total }}</h2>

    <a class="btn checkout" href="{% url 'create_order' %}">✅ Place Order</a>

{% else %}
    <p>Your cart is empty 😢</p>
{% endif %}

<br>
<a class="btn back" href="{% url 'home' %}">← Back to Menu</a>

</body>
</html>
