<!DOCTYPE html>
<html>
<head>
    <title>My Orders - QuickBite</title>
    <style>
        body {
            background-color: #0d1b2a;
            color: white;
            font-family: Arial;
            padding: 40px;
        }
        .order-box {
            background: #1b263b;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 12px;
        }
        h1 {
            color: #00b4d8;
        }
        .btn {
            display: inline-block;
            background: #0077b6;
            color: white;
            padding: 8px 15px;
            border-radius: 6px;
            text-decoration: none;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<h1>📦 My Orders</h1>

{% if orders %}
    {% for order in orders %}
    <div class="order-box">
       <p>
    <strong>Order ID:</strong>
    <a href="{% url 'order_detail' order.id %}" style="color:#00b4d8;">
        #{{ order.id }}
    </a>
</p>
        <p><strong>Status:</strong> {{ order.status }}</p>
        <p><strong>Total:</strong> {{ order.total_price }} Tk</p>
        <p><strong>Date:</strong> {{ order.created_at }}</p>
    </div>
    {% endfor %}
{% else %}
    <p>You have no orders yet.</p>
{% endif %}

<a class="btn" href="{% url 'home' %}">← Back to Menu</a>

</body>
</html>
